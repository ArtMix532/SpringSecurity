spring.application.name=springsecurity

jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

# Inicializa??o de dados
#spring.sql.init.mode=always

# Cria??o autom?tica das tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Conex?o direta com o localhost (com cria??o autom?tica do banco ativada)
spring.datasource.url=jdbc:mysql://localhost:3306/e_commerce?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.security.oauth2.cliente.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.cliente.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Usado pelo GoogleAuthService para validar o idToken
google.client.id=${GOOGLE_CLIENT_ID}

# Configuraþ§es do servidor Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL-USER}
spring.mail.password=${MAIL-PASSWORD}

# Propriedades de seguranþa exigidas pelo Google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true