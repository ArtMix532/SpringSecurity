<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Confirmação de E-mail</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f5; padding: 40px 0; margin: 0;">
<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">

    <h1 style="color: #0f172a; font-size: 28px; margin-bottom: 30px;">
        Navy<span style="color: #3b82f6;">Store</span>
    </h1>

    <h2 style="color: #1e293b; font-size: 22px;">Olá, <span th:text="${nome}">Cliente</span>!</h2>

    <p style="color: #475569; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
        Falta apenas um passo para finalizar a criação da sua conta. Por favor, confirme seu endereço de e-mail clicando no botão abaixo:
    </p>

    <a th:href="${linkConfirmacao}" style="display: inline-block; background-color: #3b82f6; color: #ffffff; text-decoration: none; padding: 14px 28px; border-radius: 6px; font-weight: bold; font-size: 16px;">
        Confirmar Meu E-mail
    </a>

    <p style="color: #94a3b8; font-size: 14px; margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
        Se você não solicitou este cadastro, pode ignorar este e-mail com segurança.
    </p>
</div>
</body>
</html>
